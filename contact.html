<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <a href="index.html" class="logo">Mamadou<span>.</span></a>
    <ul>
      <li><a href="index.html">Accueil</a></li>
      <li><a href="projets.html">Projets</a></li>
      <li><a href="contact.html" class="actif">Contact</a></li>
    </ul>
  </nav>

  <!-- TITRE -->
  <section class="page-titre">
    <h1>Me contacter</h1>
    <p>Un projet ? Une question ? Écris-moi !</p>
  </section>

  <!-- FORMULAIRE CONTACT -->
  <section class="formulaire-section">
    <h2>Envoyer un message</h2>
    <form class="formulaire">

      <label for="nom">Nom :</label>
      <input type="text" id="nom" name="nom" placeholder="Votre nom" required>

      <label for="email">E-mail :</label>
      <input type="email" id="email" name="email" placeholder="votre@email.com" required>

      <label for="message">Message :</label>
      <textarea id="message" name="message" rows="5" placeholder="Votre message..." required></textarea>

      <button type="submit" class="bouton">Envoyer</button>

    </form>
  </section>

  <!-- FORMULAIRE DEMANDE DE PROJET -->
  <section class="formulaire-section">
    <h2>Demande de projet</h2>
    <form class="formulaire">

      <label for="nom2">Nom :</label>
      <input type="text" id="nom2" name="nom2" placeholder="Votre nom" required>

      <label for="email2">E-mail :</label>
      <input type="email" id="email2" name="email2" placeholder="votre@email.com" required>

      <label for="type">Type de projet :</label>
      <select id="type" name="type">
        <option value="">-- Choisir --</option>
        <option value="site">Site vitrine</option>
        <option value="boutique">Boutique en ligne</option>
        <option value="creation">creation d'application mobile</option>
        <option value="autre">Autre</option>
      </select>

      <label for="description">Description :</label>
      <textarea id="description" name="description" rows="5" placeholder="Décrivez votre projet..." required></textarea>

      <button type="submit" class="bouton">Envoyer</button>

    </form>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Mamadou Diop — <a href="contact.html">Me contacter</a></p>
  </footer>

</body>
</html>
